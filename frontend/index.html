<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>BugToByte Academy — Coding &amp; AI for Kids Aged 7–14</title>
    <meta name="description" content="Live, expert-led coding classes for kids aged 7–14. Scratch, AI Fundamentals &amp; Python — small groups, €20/session, Berlin timezone. Book a free demo today." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://bugtobyte.com/" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="BugToByte Academy" />
    <meta property="og:url"         content="https://bugtobyte.com/" />
    <meta property="og:title"       content="BugToByte Academy — Coding &amp; AI for Kids" />
    <meta property="og:description" content="Live coding classes for kids aged 7–14. Scratch, AI &amp; Python. Small groups, just €20/session." />
    <meta property="og:image"       content="https://bugtobyte.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:locale:alternate" content="de_DE" />
    <meta property="og:locale:alternate" content="ar_SA" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@bugtobyte" />
    <meta name="twitter:title"       content="BugToByte Academy — Coding &amp; AI for Kids" />
    <meta name="twitter:description" content="Live coding classes for kids aged 7–14. Scratch, AI &amp; Python. Small groups, just €20/session." />
    <meta name="twitter:image"       content="https://bugtobyte.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16"   href="/favicon-16x16.png" />
    <link rel="apple-touch-icon"      sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon-32x32.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#050A12" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "BugToByte Academy",
      "url": "https://bugtobyte.com",
      "logo": "https://bugtobyte.com/og-image.png",
      "description": "Live, expert-led coding classes for kids aged 7–14. Scratch, AI Fundamentals and Python.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Berlin",
        "addressCountry": "DE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@bugtobyte.com",
        "contactType": "customer support",
        "availableLanguage": ["English", "German", "Arabic"]
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: Courses -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "BugToByte Courses",
      "itemListElement": [
        {
          "@type": "Course",
          "position": 1,
          "name": "Scratch Creators",
          "description": "Block coding for beginners. Ages 7–9. No prior experience needed.",
          "provider": { "@type": "Organization", "name": "BugToByte Academy", "url": "https://bugtobyte.com" },
          "offers": { "@type": "Offer", "price": "160", "priceCurrency": "EUR" },
          "hasCourseInstance": { "@type": "CourseInstance", "courseMode": "online", "instructor": { "@type": "Person", "name": "BugToByte Instructor" } }
        },
        {
          "@type": "Course",
          "position": 2,
          "name": "AI Fundamentals",
          "description": "Machine learning made fun. Ages 10–12. Train real AI models.",
          "provider": { "@type": "Organization", "name": "BugToByte Academy", "url": "https://bugtobyte.com" },
          "offers": { "@type": "Offer", "price": "160", "priceCurrency": "EUR" }
        },
        {
          "@type": "Course",
          "position": 3,
          "name": "Python Lab",
          "description": "Real code, real projects. Ages 13–14. Professional Python development.",
          "provider": { "@type": "Organization", "name": "BugToByte Academy", "url": "https://bugtobyte.com" },
          "offers": { "@type": "Offer", "price": "200", "priceCurrency": "EUR" }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>html,body,#root{margin:0;padding:0;background:#050A12;min-height:100vh}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
